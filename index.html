<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI RI-STU-MRD2 PCB Antenna Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pass { color: #16a34a; font-weight: bold; }
        .fail { color: #dc2626; font-weight: bold; }
        input[type="number"], select { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row">
        
        <div class="md:w-1/2 p-8 bg-gray-100 border-r border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-blue-900">Antenna Parameters</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Outer Length (mm)</label>
                    <input type="number" id="length" value="150" step="1" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Outer Width (mm)</label>
                    <input type="number" id="width" value="120" step="1" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Number of Turns</label>
                    <input type="number" id="turns" value="15" step="1" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Trace Width (mm)</label>
                    <input type="number" id="traceW" value="1.0" step="0.1" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Trace Spacing (mm)</label>
                    <input type="number" id="traceS" value="0.5" step="0.1" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Copper Weight</label>
                    <select id="cuWeight" onchange="calculate()">
                        <option value="0.5">0.5 oz (17.5 µm)</option>
                        <option value="1.0" selected>1.0 oz (35 µm)</option>
                        <option value="2.0">2.0 oz (70 µm)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Corner Routing Type</label>
                    <select id="cornerType" onchange="calculate()">
                        <option value="90">90 Degree (Sharp)</option>
                        <option value="45">45 Degree Chamfer</option>
                        <option value="curve">Curved Arc</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="md:w-1/2 p-8 relative">
            <h2 class="text-2xl font-bold mb-6 text-blue-900">Analysis Results</h2>
            <div id="error-msg" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4"></div>
            
            <div id="results-container" class="space-y-6">
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <h3 class="font-semibold text-gray-600 mb-2 border-b pb-1">Physical Properties</h3>
                    <div class="flex justify-between py-1">
                        <span>Total Trace Length:</span>
                        <span id="outLength" class="font-mono font-medium">0.00 m</span>
                    </div>
                    <div class="flex justify-between py-1">
                        <span>DC Resistance (@134.2kHz):</span>
                        <span id="outRes" class="font-mono font-medium">0.00 Ω</span>
                    </div>
                </div>

                <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                    <h3 class="font-semibold text-blue-800 mb-2 border-b border-blue-200 pb-1">TI RI-STU-MRD2 Requirements</h3>
                    
                    <div class="mt-3">
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-sm font-medium text-gray-700">Inductance (Target: 46 - 47.9 µH)</span>
                            <span id="outInd" class="text-lg font-mono">0.00 µH</span>
                        </div>
                        <div id="indStatus" class="text-right text-sm"></div>
                    </div>

                    <div class="mt-5">
                        <div class="flex justify-between items-end mb-1">
                            <span class="text-sm font-medium text-gray-700">Q-Factor (Target: 10 - 20)</span>
                            <span id="outQ" class="text-lg font-mono">0.00</span>
                        </div>
                        <div id="qStatus" class="text-right text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            // Constants
            const freq = 134200; // Hz
            const rho_cu = 1.68e-8; // Ohm-m
            const mu0 = 4 * Math.PI * 1e-7;

            // Inputs
            const L_out = parseFloat(document.getElementById('length').value);
            const W_out = parseFloat(document.getElementById('width').value);
            const N = parseInt(document.getElementById('turns').value);
            const w = parseFloat(document.getElementById('traceW').value);
            const s = parseFloat(document.getElementById('traceS').value);
            const cu_oz = parseFloat(document.getElementById('cuWeight').value);
            const corner = document.getElementById('cornerType').value;

            const errDiv = document.getElementById('error-msg');
            const resDiv = document.getElementById('results-container');

            try {
                const cu_thick = cu_oz * 0.035; // mm
                
                // Inner Dimensions
                const L_in = L_out - 2*N*(w+s);
                const W_in = W_out - 2*N*(w+s);

                if (L_in <= 0 || W_in <= 0) {
                    throw new Error("Geometry Error: Too many turns for this board size. Traces overlap in the center.");
                }

                // Average Dimensions & Perimeter
                const L_avg = (L_out + L_in) / 2;
                const W_avg = (W_out + W_in) / 2;
                let base_perimeter = 2 * (L_avg + W_avg);

                // Corner Physics Correction
                let corner_adj = 0;
                if (corner === "45") {
                    corner_adj = 4 * (2 - Math.sqrt(2)) * w;
                } else if (corner === "curve") {
                    corner_adj = 4 * (2 - (Math.PI/2)) * w;
                }
                
                const adj_perimeter = base_perimeter - corner_adj;
                const total_len_m = (N * adj_perimeter) / 1000;

                // Resistance
                const area_m2 = (w / 1000) * (cu_thick / 1000);
                const R = rho_cu * (total_len_m / area_m2);

                // Inductance (Modified Wheeler for Rectangular Planar)
                const d_out = (L_out + W_out) / 2;
                const d_in = (L_in + W_in) / 2;
                const d_avg = (d_out + d_in) / 2 / 1000; // meters
                const fill_ratio = (d_out - d_in) / (d_out + d_in);
                
                const c1 = 1.27, c2 = 2.07, c3 = 0.18, c4 = 0.13;
                const L_est = (mu0 * Math.pow(N, 2) * d_avg * c1 / 2) * (Math.log(c2 / fill_ratio) + c3 * fill_ratio + c4 * Math.pow(fill_ratio, 2));
                const L_uH = L_est * 1e6;

                // Q Factor
                const XL = 2 * Math.PI * freq * L_est;
                const Q = XL / R;

                // Update UI
                errDiv.classList.add('hidden');
                resDiv.classList.remove('opacity-20');

                document.getElementById('outLength').innerText = total_len_m.toFixed(2) + " m";
                document.getElementById('outRes').innerText = R.toFixed(2) + " Ω";
                
                const indEl = document.getElementById('outInd');
                const indStat = document.getElementById('indStatus');
                indEl.innerText = L_uH.toFixed(2) + " µH";
                if (L_uH >= 46.0 && L_uH <= 47.9) {
                    indStat.innerHTML = '<span class="pass">✓ PASS (Optimal)</span>';
                    indEl.className = "text-lg font-mono pass";
                } else {
                    indStat.innerHTML = '<span class="fail">✗ FAIL (Outside limits)</span>';
                    indEl.className = "text-lg font-mono fail";
                }

                const qEl = document.getElementById('outQ');
                const qStat = document.getElementById('qStatus');
                qEl.innerText = Q.toFixed(2);
                if (Q >= 10.0 && Q <= 20.0) {
                    qStat.innerHTML = '<span class="pass">✓ PASS (Optimal)</span>';
                    qEl.className = "text-lg font-mono pass";
                } else {
                    qStat.innerHTML = '<span class="fail">✗ FAIL (Outside limits)</span>';
                    qEl.className = "text-lg font-mono fail";
                }

            } catch (e) {
                errDiv.innerText = e.message;
                errDiv.classList.remove('hidden');
                resDiv.classList.add('opacity-20');
            }
        }

        // Init
        window.onload = calculate;
    </script>
</body>
</html>
